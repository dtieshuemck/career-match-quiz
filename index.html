  <style>
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
    body { background: #080815; margin: 0; padding: 0; }

    @keyframes slideInRight  { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutLeft  { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-80px); opacity: 0; } }
    @keyframes fadeUp        { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes spin          { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse   { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes glowPulse     { 0%,100% { box-shadow: 0 0 30px rgba(99,102,241,.25); } 50% { box-shadow: 0 0 60px rgba(99,102,241,.55); } }
    @keyframes shimmer       { from { background-position: -200% center; } to { background-position: 200% center; } }

    .slide-in  { animation: slideInRight .32s cubic-bezier(.25,.8,.25,1) forwards; }
    .slide-out { animation: slideOutLeft .28s cubic-bezier(.25,.8,.25,1) forwards; }
    .fade-up   { animation: fadeUp .5s cubic-bezier(.25,.8,.25,1) forwards; }
    .spin-cw   { animation: spin .9s linear infinite; }
    .spin-ccw  { animation: spinReverse .65s linear infinite; }
    .glow-card { animation: glowPulse 2.5s ease-in-out infinite; }

    .glass {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.08);
    }
    .glass-strong {
      background: rgba(99,102,241,.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99,102,241,.35);
    }

    .grad-text {
      background: linear-gradient(135deg, #a5b4fc 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .grad-btn {
      background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
      box-shadow: 0 4px 24px rgba(99,102,241,.45);
      transition: transform .15s, box-shadow .15s;
    }
    .grad-btn:hover  { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 32px rgba(99,102,241,.6); }
    .grad-btn:active { transform: scale(.97); }

    .answer-btn {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.09);
      transition: background .18s, border-color .18s, transform .12s;
      cursor: pointer;
    }
    .answer-btn:hover:not(.locked) {
      background: rgba(99,102,241,.12);
      border-color: rgba(99,102,241,.4);
      transform: translateX(4px);
    }
    .answer-btn.selected {
      background: rgba(99,102,241,.2);
      border-color: #6366f1;
    }
    .answer-btn.dimmed { opacity: .3; cursor: default; }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.3); border-radius: 3px; }

    .orb {
      position: fixed; border-radius: 50%; pointer-events: none;

    /* ================================================================
       MATCHING ALGORITHM
    ================================================================ */
    function computeUserVector(answers) {
      const v = new Array(8).fill(0);
      answers.forEach(({ qId, aIdx }) => {
        const q = QUESTIONS.find(q => q.id === qId);
        if (q && q.answers[aIdx]) q.answers[aIdx].d.forEach((delta, i) => { v[i] += delta; });
      });
      return v;
    }

    function cosineSim(v1, v2) {
      const dot  = v1.reduce((s, a, i) => s + a * v2[i], 0);
      const mag1 = Math.sqrt(v1.reduce((s, a) => s + a * a, 0));
      const mag2 = Math.sqrt(v2.reduce((s, a) => s + a * a, 0));
      return (mag1 === 0 || mag2 === 0) ? 0 : dot / (mag1 * mag2);
    }

    function bestCityForJob(job) {
      return CITIES.reduce((best, city) => {
        const w = city.iw[job.cat] || 0;
        return w > (best.w || -1) ? { city, w } : best;
      }, {}).city || CITIES[0];
    }

    function bestCompanyForJobCity(job, city) {
      const exact = COMPANIES.filter(c => c.cityId === city.id && c.cat === job.cat);
      if (exact.length) return exact[0];
      const fallback = COMPANIES.filter(c => c.cityId === city.id);
      return fallback.length ? fallback[0] : COMPANIES[0];
    }

    function getRankedResults(userVec) {
      return JOBS
        .map(job => ({ job, score: cosineSim(userVec, job.v) }))
        .sort((a, b) => b.score - a.score)
        .map(({ job, score }, idx) => {
          const city    = bestCityForJob(job);
          const company = bestCompanyForJobCity(job, city);
          return { rank: idx + 1, job, city, company, score };
        });
    }

                          <div style={{
                            width:10, height:10, borderRadius:'50%',
                            background: isLast ? 'linear-gradient(135deg,#6366f1,#3b82f6)' : 'rgba(255,255,255,.25)',
                          }} />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-xs text-gray-500 mb-0.5">{lvl.range}</div>
                          <div className={`text-sm font-bold ${isLast ? 'text-white' : 'text-gray-300'}`}>{lvl.title}</div>
                        </div>
                        <div className={`text-sm font-black flex-shrink-0 ${isLast ? 'grad-text' : 'text-gray-400'}`}>
                          {lvl.salary}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
       COMPONENT: ResultsScreen
    ================================================================ */
    function ResultsScreen({ results, userVec, onRestart }) {
      const [showWorst, setShowWorst] = useState(false);
      const [showDetail, setShowDetail] = useState(false);
      const top    = results[0];
      const top10  = results.slice(0, 10);
      const bot10  = results.slice(-10).reverse();

      return (
        <div className="min-h-screen px-4 py-14"
          style={{ background:'linear-gradient(160deg,#080815 0%,#0d0d28 60%,#080815 100%)' }}>
          <div className="max-w-2xl mx-auto">

            {/* header */}
            <div className="text-center mb-8 fade-up">
              <div className="text-5xl mb-3 select-none">✨</div>
              <h1 className="text-3xl sm:text-4xl font-black text-white mb-2">Your Career Match</h1>
              <p className="text-gray-400 text-sm">Based on your unique profile across 8 career dimensions</p>
            </div>

            {/* hero — clickable to open detail modal */}
            <div className="mb-8 fade-up">
              <div
                onClick={() => setShowDetail(true)}
                style={{ cursor:'pointer' }}
                title="Click to see more details">
                <RankRow result={top} heroMode />
                <p className="text-center text-xs text-gray-500 mt-2 hover:text-gray-300 transition-colors">
                  👆 Tap to explore daily life, why you matched, and salary progression
                </p>
              </div>
            </div>

            {/* detail modal */}
            {showDetail && (
              <JobDetailModal result={top} userVec={userVec} onClose={() => setShowDetail(false)} />
            )}

            {/* top 10 */}
            <div className="mb-8 fade-up">
              <h3 className="text-base font-bold text-white mb-4 flex items-center gap-2">
                <span>🏆</span> Your Top 10 Matches
              </h3>
              <div className="flex flex-col gap-2">
                {top10.map(r => <RankRow key={r.job.id} result={r} />)}
              </div>
            </div>

            {/* bottom 10 */}
            <div className="mb-12 fade-up">
              <button onClick={() => setShowWorst(v => !v)}
                className="flex items-center gap-2 text-gray-500 hover:text-gray-200 transition-colors text-sm font-semibold mb-4">
                <span style={{ fontSize:10 }}>{showWorst ? '▼' : '▶'}</span>
                <span>😬 Your 10 Worst Matches</span>
              </button>
              {showWorst && (
                <div className="flex flex-col gap-2 fade-up">
                  {bot10.map(r => <RankRow key={r.job.id} result={r} />)}
                </div>
              )}
            </div>

            {/* restart */}
            <div className="text-center pb-10 fade-up">
              <button onClick={onRestart}
                className="glass px-8 py-3 rounded-2xl text-sm font-semibold text-gray-300 hover:text-white hover:border-indigo-500/50 transition-all duration-200">
                🔄 Retake Quiz
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
       COMPONENT: App  (state machine)
    ================================================================ */
    function App() {
      const [screen,  setScreen]  = useState('intro');   // intro | quiz | loading | results
      const [qIdx,    setQIdx]    = useState(0);
      const [answers, setAnswers] = useState([]);
      const [results, setResults] = useState(null);
      const [userVec, setUserVec] = useState(null);
      const [qKey,    setQKey]    = useState(0);         // forces QuizQuestion re-mount

      const handleStart = () => {
        setQIdx(0); setAnswers([]); setResults(null); setUserVec(null); setQKey(0);
        setScreen('quiz');
      };

      const handleAnswer = (aIdx) => {
        const newAnswers = [...answers, { qId: QUESTIONS[qIdx].id, aIdx }];
        setAnswers(newAnswers);

        if (qIdx + 1 < QUESTIONS.length) {
          setQKey(k => k + 1);
          setQIdx(i => i + 1);
        } else {
          setScreen('loading');
          setTimeout(() => {
            const vec = computeUserVector(newAnswers);
            setUserVec(vec);
            setResults(getRankedResults(vec));
            setScreen('results');
          }, 2700);
        }
      };

      if (screen === 'intro')   return <IntroScreen onStart={handleStart} />;
      if (screen === 'loading') return <LoadingScreen />;
      if (screen === 'results') return <ResultsScreen results={results} userVec={userVec} onRestart={handleStart} />;

      // quiz
      return (
        <div className="min-h-screen flex flex-col relative overflow-hidden"
          style={{ background:'linear-gradient(160deg,#080815 0%,#0d0d28 60%,#080815 100%)' }}>
          <div className="orb" style={{ top:'-10%', right:'-5%',  width:380, height:380, '--c':'rgba(99,102,241,.1)' }} />
          <div className="orb" style={{ bottom:'-10%', left:'-5%', width:340, height:340, '--c':'rgba(59,130,246,.08)' }} />

          {/* progress bar */}
          <div className="relative z-10 px-5 sm:px-8 pt-8 pb-5" style={{ maxWidth:660, margin:'0 auto', width:'100%' }}>
            <ProgressBar current={qIdx + 1} total={QUESTIONS.length} />
          </div>

          {/* question area — takes up remaining space, vertically centered */}
          <div className="relative z-10 flex-1 flex items-start sm:items-center justify-center px-4 pt-2 pb-10 overflow-hidden">
            <QuizQuestion key={qKey} question={QUESTIONS[qIdx]} onAnswer={handleAnswer} />
          </div>
        </div>
      );
    }

    /* mount */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
