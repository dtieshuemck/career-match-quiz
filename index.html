<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Career Match Quiz</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
    body { background: #f0f4ff; color: #1e1b4b; margin: 0; padding: 0; }

    @keyframes slideInRight  { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutLeft  { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-80px); opacity: 0; } }
    @keyframes fadeUp        { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes spin          { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse   { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes glowPulse     { 0%,100% { box-shadow: 0 4px 32px rgba(99,102,241,.2); } 50% { box-shadow: 0 8px 48px rgba(99,102,241,.4); } }

    .slide-in  { animation: slideInRight .32s cubic-bezier(.25,.8,.25,1) forwards; }
    .slide-out { animation: slideOutLeft .28s cubic-bezier(.25,.8,.25,1) forwards; }
    .fade-up   { animation: fadeUp .5s cubic-bezier(.25,.8,.25,1) forwards; }
    .spin-cw   { animation: spin .9s linear infinite; }
    .spin-ccw  { animation: spinReverse .65s linear infinite; }
    .glow-card { animation: glowPulse 2.5s ease-in-out infinite; }

    .glass {
      background: white;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(99,102,241,.1);
    }
    .glass-strong {
      background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(59,130,246,.06));
      border: 2px solid rgba(99,102,241,.3);
      box-shadow: 0 8px 40px rgba(99,102,241,.18);
    }

    .grad-text {
      background: linear-gradient(135deg, #4f46e5 0%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .grad-btn {
      background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
      box-shadow: 0 4px 24px rgba(99,102,241,.45);
      transition: transform .15s, box-shadow .15s;
    }
    .grad-btn:hover  { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 32px rgba(99,102,241,.6); }
    .grad-btn:active { transform: scale(.97); }

    .answer-btn {
      background: white;
      border: 2px solid #e5e7eb;
      transition: background .18s, border-color .18s, transform .15s, box-shadow .15s;
      cursor: pointer;
    }
    .answer-btn:hover:not(.dimmed) {
      background: rgba(99,102,241,.06);
      border-color: rgba(99,102,241,.5);
      transform: scale(1.02);
      box-shadow: 0 6px 24px rgba(99,102,241,.15);
    }
    .answer-btn.selected {
      background: rgba(99,102,241,.1);
      border-color: #6366f1;
      box-shadow: 0 4px 20px rgba(99,102,241,.2);
    }
    .answer-btn.dimmed { opacity: .3; cursor: default; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f0f4ff; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.3); border-radius: 3px; }

    .orb {
      position: fixed; border-radius: 50%; pointer-events: none;
      background: radial-gradient(circle, var(--c) 0%, transparent 70%);
    }

    .rank-card {
      background: white; border: 1px solid #e5e7eb;
      box-shadow: 0 2px 12px rgba(99,102,241,.06); transition: box-shadow .15s;
    }
    .rank-card:hover { box-shadow: 0 4px 20px rgba(99,102,241,.12); }
    .rank-card-top { background: rgba(99,102,241,.06); border: 1px solid rgba(99,102,241,.2); }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
      background: white; border-right: 1px solid #e5e7eb;
      box-shadow: 2px 0 20px rgba(99,102,241,.08);
      z-index: 200; display: flex; flex-direction: column;
      transition: transform .25s cubic-bezier(.25,.8,.25,1);
    }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(30,27,75,.35);
      z-index: 199; backdrop-filter: blur(2px);
    }
    .with-sidebar { margin-left: 240px; transition: margin-left .25s; }
    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .with-sidebar { margin-left: 0 !important; }
    }
    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 11px 16px; border-radius: 10px;
      border: none; background: transparent; cursor: pointer;
      font-size: 14px; font-weight: 500; color: #374151;
      text-align: left; transition: background .15s, color .15s;
    }
    .nav-btn:hover { background: rgba(99,102,241,.06); color: #4f46e5; }
    .nav-btn.active { background: rgba(99,102,241,.1); color: #4f46e5; font-weight: 700; }
    .hamburger {
      position: fixed; top: 14px; left: 14px; z-index: 198;
      width: 40px; height: 40px; border-radius: 10px;
      background: white; border: 1px solid #e5e7eb;
      box-shadow: 0 2px 12px rgba(99,102,241,.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px;
    }
  </style>
</head>

    /* ================================================================
       MATCHING ALGORITHM
    ================================================================ */
    function computeUserVector(answers) {
      const v = new Array(8).fill(0);
      answers.forEach(({ qId, aIdx }) => {
        const q = QUESTIONS.find(q => q.id === qId);
        if (q && q.answers[aIdx]) q.answers[aIdx].d.forEach((delta, i) => { v[i] += delta; });
      });
      return v;
    }

    function cosineSim(v1, v2) {
      const dot  = v1.reduce((s, a, i) => s + a * v2[i], 0);
      const mag1 = Math.sqrt(v1.reduce((s, a) => s + a * a, 0));
      const mag2 = Math.sqrt(v2.reduce((s, a) => s + a * a, 0));
      return (mag1 === 0 || mag2 === 0) ? 0 : dot / (mag1 * mag2);
    }

    function bestCityForJob(job) {
      return CITIES.reduce((best, city) => {
        const w = city.iw[job.cat] || 0;
        return w > (best.w || -1) ? { city, w } : best;
      }, {}).city || CITIES[0];
    }

    function bestCompanyForJobCity(job, city) {
      const exact = COMPANIES.filter(c => c.cityId === city.id && c.cat === job.cat);
      if (exact.length) return exact[0];
      const fallback = COMPANIES.filter(c => c.cityId === city.id);
      return fallback.length ? fallback[0] : COMPANIES[0];
    }

    function getRankedResults(userVec) {
      return JOBS
        .map(job => ({ job, score: cosineSim(userVec, job.v) }))
        .sort((a, b) => b.score - a.score)
        .map(({ job, score }, idx) => {
          const city    = bestCityForJob(job);
          const company = bestCompanyForJobCity(job, city);
          return { rank: idx + 1, job, city, company, score };
        });
    }

        setSelected(idx);
        setTimeout(() => setLeaving(true), 300);
        setTimeout(() => onAnswer(idx),    580);
      };

      const gradient = CAT_GRADIENT[question.cat] || 'from-indigo-500 to-blue-500';

      return (
        <div className={leaving ? 'slide-out' : 'slide-in'} style={{ width:'100%', maxWidth:660, margin:'0 auto' }}>

          {/* category badge + question */}
          <div className="text-center px-4 mb-8">
            <span className={`inline-block bg-gradient-to-r ${gradient} text-white text-xs font-bold uppercase tracking-widest px-4 py-1.5 rounded-full mb-6`}>
              {question.cat}
            </span>
            <h2 className="text-3xl sm:text-4xl font-black leading-tight" style={{color:'#1e1b4b'}}>
              {question.text}
            </h2>
          </div>

          {/* two big choice cards */}
          <div className="flex flex-col sm:flex-row gap-4 px-4">
            {question.answers.map((ans, idx) => {
              const isSelected = selected === idx;
              const isDimmed   = selected !== null && !isSelected;
              return (
                <button
                  key={idx}
                  onClick={() => pick(idx)}
                  className="flex-1 rounded-3xl flex flex-col items-center justify-center text-center transition-all duration-200"
                  style={{
                    minHeight: 180,
                    padding: '2rem 1.5rem',
                    background: isSelected
                      ? 'linear-gradient(135deg,rgba(99,102,241,.14),rgba(59,130,246,.12))'
                      : 'white',
                    border: `2px solid ${isSelected ? '#6366f1' : '#e5e7eb'}`,
                    opacity: isDimmed ? 0.3 : 1,
                    cursor: isDimmed ? 'default' : 'pointer',
                    transform: isSelected ? 'scale(1.03)' : 'scale(1)',
                    boxShadow: isSelected ? '0 8px 40px rgba(99,102,241,.25)' : '0 2px 12px rgba(99,102,241,.07)',
                  }}
                  onMouseEnter={e => { if (selected === null) { e.currentTarget.style.background = 'rgba(99,102,241,.06)'; e.currentTarget.style.borderColor = 'rgba(99,102,241,.4)'; e.currentTarget.style.transform = 'scale(1.02)'; e.currentTarget.style.boxShadow = '0 6px 28px rgba(99,102,241,.18)'; }}}
                  onMouseLeave={e => { if (selected === null) { e.currentTarget.style.background = 'white'; e.currentTarget.style.borderColor = '#e5e7eb'; e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 2px 12px rgba(99,102,241,.07)'; }}}
                >
                  {isSelected && (
                    <span className="text-2xl mb-3" style={{color:'#6366f1'}}>✓</span>
                  )}
                  <span className="text-2xl sm:text-3xl font-black leading-tight" style={{color: isSelected ? '#4f46e5' : '#1e1b4b'}}>
                    {ans.text}
                  </span>
                </button>
              );
            })}
          </div>

          {/* hint */}
          <p className="text-center text-xs mt-5 sm:hidden uppercase tracking-widest" style={{color:'#9ca3af'}}>tap to choose</p>
        </div>
      );
    }

    /* ================================================================
       COMPONENT: LoadingScreen
    ================================================================ */
    function LoadingScreen() {
      const [step, setStep] = useState(0);
      const steps = [
        'Analyzing your personality profile…',
        'Mapping your strengths and values…',
        'Scoring 58 career paths…',
        'Matching you to real companies…',
        'Building your personalized rankings…',
      ];
      useEffect(() => {
        let i = 0;
        const t = setInterval(() => { i++; if (i < steps.length) setStep(i); }, 480);
        return () => clearInterval(t);
      }, []);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-4"
          style={{ background:'linear-gradient(160deg,#f0f4ff 0%,#e8eeff 60%,#f0f4ff 100%)' }}>
          <div className="text-center fade-up">
            {/* spinner rings */}
            <div className="relative mx-auto mb-8" style={{ width:88, height:88 }}>
              <div className="spin-cw absolute inset-0 rounded-full"
                style={{ border:'3px solid transparent', borderTopColor:'#6366f1', borderRightColor:'#3b82f6' }} />
              <div className="spin-ccw absolute inset-2 rounded-full"
                style={{ border:'2px solid transparent', borderTopColor:'#a5b4fc' }} />
              <div className="absolute inset-0 flex items-center justify-center text-3xl select-none">🧭</div>
            </div>

            <h2 className="text-2xl font-bold mb-1" style={{color:'#1e1b4b'}}>Finding Your Match</h2>
            <p className="text-sm mb-8" style={{color:'#6b7280'}}>Running the numbers…</p>

            <div className="flex flex-col gap-2 text-left" style={{ minWidth:260 }}>
              {steps.map((s, i) => (
                <div key={i} className="flex items-center gap-3 text-sm transition-all duration-300"
                  style={{ opacity: i <= step ? 1 : 0.25 }}>
                  <span style={{ color: i < step ? '#22c55e' : i === step ? '#6366f1' : '#d1d5db', minWidth:14 }}>
                    {i < step ? '✓' : i === step ? '◈' : '○'}
                  </span>
                  <span style={{ color: i <= step ? '#374151' : '#9ca3af' }}>{s}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
       COMPONENT: ScoreBar
    ================================================================ */
    function ScoreBar({ score, delay = 0 }) {
      const pct = Math.round(score * 100);
      const [w, setW] = useState(0);
      useEffect(() => {
        const t = setTimeout(() => setW(pct), delay + 80);
        return () => clearTimeout(t);
      }, [pct, delay]);
      return (
        <div className="flex items-center gap-3">
          <div className="flex-1 rounded-full" style={{ height:4, background:'#e5e7eb' }}>
            <div className="rounded-full" style={{
              height:4, width:`${w}%`,
              background: `linear-gradient(90deg,#6366f1,#3b82f6)`,
              transition: `width 1s cubic-bezier(.25,.8,.25,1)`,
            }} />
          </div>
          <span className="text-xs font-bold w-9 text-right" style={{ color:'#6366f1' }}>{pct}%</span>
        </div>
      );
    }

      return (
        <div className="rounded-2xl p-4 transition-all duration-150"

          <div className="flex items-center gap-3">
            <div className="flex-shrink-0 text-center" style={{ minWidth:28 }}>
              {medal
                ? <span className="text-lg select-none">{medal}</span>
                : <span className="text-xs font-bold" style={{color:'#9ca3af'}}>#{result.rank}</span>}

            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-0.5">
                <span className="text-base select-none">{result.job.emoji}</span>

              <div className="flex items-center gap-2 text-xs mb-2 flex-wrap" style={{color:'#6b7280'}}>
                <span>{result.city.emoji} {result.city.name}</span>

    /* ================================================================
       COMPONENT: JobDetailModal
    ================================================================ */
    function JobDetailModal({ result, userVec, onClose }) {
      const { job } = result;

      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      // Build "Why You" reasons — only when userVec is available
      let reasons = null;
      if (userVec) {
        const userTopIdx = [...userVec].map((v,i)=>({i,v})).sort((a,b)=>b.v-a.v).slice(0,4).map(x=>x.i);
        const jobTopIdx  = [...job.v].map((v,i)=>({i,v})).sort((a,b)=>b.v-a.v).slice(0,4).map(x=>x.i);
        const overlap = userTopIdx.filter(i => jobTopIdx.includes(i));
        reasons = (overlap.length ? overlap : userTopIdx.slice(0,2))
          .map(i => ({ dim: DIM_NAMES[i], reason: DIM_REASONS[DIM_NAMES[i]] }));
      }
      const matchPct = userVec ? Math.round(result.score * 100) : null;

      // Total career horizon from last level range
      const lastRange = job.levels[job.levels.length - 1].range;

      return (
        <div onClick={onClose}

                <p style={{ fontSize:15, color:'#374151', lineHeight:1.75, margin:0 }}>{job.daily}</p>

                  <div style={{ fontSize:11, fontWeight:800, color:'#6366f1', textTransform:'uppercase', letterSpacing:1, marginBottom:10 }}>
                    🎯 Why You Were Matched {matchPct !== null && `(${matchPct}% fit)`}

                  <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                    {reasons.map(({ dim, reason }) => (
                      <div key={dim} style={{ background:'rgba(99,102,241,.05)', border:'1px solid rgba(99,102,241,.15)', borderRadius:14, padding:'12px 16px' }}>

                        <div style={{ fontSize:13, color:'#6b7280', lineHeight:1.6 }}>{reason}</div>

                            {lvl.desc && (
                              <div style={{ fontSize:13, color: isLast ? '#4b5563' : '#6b7280', lineHeight:1.6, borderTop:`1px solid ${isLast ? 'rgba(99,102,241,.12)' : '#efefef'}`, paddingTop:8, marginTop:4 }}>

                </div>
              </div>
            </div>
          </div>
        </div>
      );

            <div className="text-center mb-8 fade-up">
              <div className="text-5xl mb-3 select-none">✨</div>

                <p className="text-center text-xs mt-2 transition-colors" style={{color:'#9ca3af'}}>
                  👆 Tap to explore daily life, why you matched, and salary progression
                </p>

    /* ================================================================
       COMPONENT: App  (state machine + sidebar navigation)
       page: 'home' | 'quiz' | 'loading' | 'results' | 'about' | 'explore'
    ================================================================ */
    function App() {
      const [page,    setPage]    = useState('home');
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [qIdx,    setQIdx]    = useState(0);
      const [answers, setAnswers] = useState([]);
      const [results, setResults] = useState(null);
      const [userVec, setUserVec] = useState(null);
      const [qKey,    setQKey]    = useState(0);

      const navigate = (dest) => {
        setSidebarOpen(false);
        if (dest === 'quiz') {
          setQIdx(0); setAnswers([]); setResults(null); setUserVec(null); setQKey(0);
        }
        setPage(dest);
      };

      const handleAnswer = (aIdx) => {
        const newAnswers = [...answers, { qId: QUESTIONS[qIdx].id, aIdx }];
        setAnswers(newAnswers);
        if (qIdx + 1 < QUESTIONS.length) {
          setQKey(k => k + 1);
          setQIdx(i => i + 1);
        } else {
          setPage('loading');
          setTimeout(() => {
            const vec = computeUserVector(newAnswers);
            setUserVec(vec);
            setResults(getRankedResults(vec));
            setPage('results');
          }, 2700);
        }
      };

      // Quiz and loading screens: full-screen, no sidebar
      const fullScreen = page === 'quiz' || page === 'loading';

      if (page === 'loading') return <LoadingScreen />;

      if (page === 'quiz') return (
        <div className="min-h-screen flex flex-col relative overflow-hidden"
          style={{ background:'linear-gradient(160deg,#f0f4ff 0%,#e8eeff 60%,#f0f4ff 100%)' }}>
          <div className="orb" style={{ top:'-10%', right:'-5%',  width:380, height:380, '--c':'rgba(99,102,241,.12)' }} />
          <div className="orb" style={{ bottom:'-10%', left:'-5%', width:340, height:340, '--c':'rgba(59,130,246,.09)' }} />
          {/* back to home */}
          <button onClick={() => navigate('home')}
            style={{ position:'absolute', top:16, left:16, zIndex:10, background:'white', border:'1px solid #e5e7eb',
              borderRadius:10, padding:'8px 14px', fontSize:13, color:'#6366f1', fontWeight:600, cursor:'pointer',
              boxShadow:'0 2px 8px rgba(99,102,241,.12)' }}>
            ← Home
          </button>
          <div className="relative z-10 px-5 sm:px-8 pt-16 pb-5" style={{ maxWidth:660, margin:'0 auto', width:'100%' }}>
            <ProgressBar current={qIdx + 1} total={QUESTIONS.length} />
          </div>
          <div className="relative z-10 flex-1 flex items-start sm:items-center justify-center px-4 pt-2 pb-10 overflow-hidden">
            <QuizQuestion key={qKey} question={QUESTIONS[qIdx]} onAnswer={handleAnswer} />
          </div>
        </div>
      );

      // Pages with sidebar layout
      const sidebarPage = page === 'results' ? 'results' :
                          page === 'about' ? 'about' :
                          page === 'explore' ? 'explore' : 'home';

      return (
        <div style={{ display:'flex', minHeight:'100vh' }}>
          {/* sidebar */}
          <Sidebar page={sidebarPage} navigate={navigate} open={sidebarOpen} onClose={() => setSidebarOpen(false)} />

          {/* hamburger (mobile) */}
          <button className="hamburger" style={{ display:'none' }}
            id="hamburger-btn"
            onClick={() => setSidebarOpen(o => !o)}>☰</button>

          {/* main content */}
          <div className="with-sidebar" style={{ flex:1, minWidth:0 }}>
            {page === 'home'    && <HomePage    onStartQuiz={() => navigate('quiz')} />}
            {page === 'about'   && <AboutPage />}
            {page === 'explore' && <ExplorePage />}
            {page === 'results' && <ResultsScreen results={results} userVec={userVec}
              onRestart={() => navigate('quiz')} />}
          </div>
        </div>
      );
    }

    /* Show hamburger on mobile via tiny inline script */
    function HamburgerInit() {
      useEffect(() => {
        const btn = document.getElementById('hamburger-btn');
        if (btn) btn.style.display = window.innerWidth < 768 ? 'flex' : 'none';
        const onResize = () => { if (btn) btn.style.display = window.innerWidth < 768 ? 'flex' : 'none'; };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      return null;
    }

    /* mount */
    ReactDOM.createRoot(document.getElementById('root')).render(<><App /><HamburgerInit /></>);
  </script>
</body>
</html>
